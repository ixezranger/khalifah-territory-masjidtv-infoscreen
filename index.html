    <!-- GitHub Pages SPA routing fix: restore path encoded by 404.html -->
    <script>
      (function() {
        var p = window.location.search.match(/[?&]p=([^&]+)/);
        if (p) {
          var path = decodeURIComponent(p[1]);
          var url = window.location.pathname + path +
                    window.location.search.replace(/[?&]p=[^&]+/, '').replace(/^&/, '?') +
                    window.location.hash;
          window.history.replaceState(null, '', url);
        }
      })();
    </script>

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
