<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>MasjidTV</title>
  <script>
    // GitHub Pages SPA fix — encode the path and redirect to index.html
    // so React Router can take over on load.
    var repo = '/khalifah-territory-masjidtv-infoscreen';
    var path = window.location.pathname.replace(repo, '');
    var search = window.location.search;
    var hash = window.location.hash;
    var redirect = repo + '/?p=' + encodeURIComponent(path + search) + hash;
    window.location.replace(redirect);
  </script>
</head>
<body></body>
</html>
